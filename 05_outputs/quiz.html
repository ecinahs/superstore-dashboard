<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hatch and Grow 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 680px;
      width: 100%;
      padding: 36px 40px;
    }

    h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 4px; }
    .subtitle { color: #6b7280; font-size: 0.9rem; margin-bottom: 28px; }

    .name-screen label { display: block; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .name-screen input {
      width: 100%; padding: 13px 16px;
      border: 2px solid #e5e7eb; border-radius: 10px;
      font-size: 1rem; color: #111827; outline: none;
      transition: border-color 0.2s; margin-bottom: 20px;
    }
    .name-screen input:focus { border-color: #6366f1; }

    .start-btn {
      background: #6366f1; color: #fff; border: none;
      border-radius: 10px; padding: 13px 32px;
      font-size: 0.97rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s; width: 100%;
    }
    .start-btn:hover { background: #4f46e5; }
    .start-btn:disabled { background: #c7d2fe; cursor: not-allowed; }

    .progress { display: flex; gap: 6px; margin-bottom: 28px; }
    .progress-dot {
      height: 6px; flex: 1; border-radius: 4px;
      background: #e5e7eb; transition: background 0.3s;
    }
    .progress-dot.active { background: #6366f1; }
    .progress-dot.done   { background: #10b981; }
    .progress-dot.wrong  { background: #ef4444; }

    .team-badge {
      display: inline-block; font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.05em; padding: 3px 10px; border-radius: 99px; margin-bottom: 12px;
    }
    .team-DA { background: #ede9fe; color: #6d28d9; }
    .team-DG { background: #dbeafe; color: #1d4ed8; }
    .team-PE { background: #dcfce7; color: #15803d; }

    .q-number { font-size: 0.8rem; color: #9ca3af; margin-bottom: 6px; }
    .q-text { font-size: 1.05rem; color: #111827; line-height: 1.55; margin-bottom: 22px; white-space: pre-wrap; }

    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      background: #f9fafb; border: 2px solid #e5e7eb;
      border-radius: 10px; padding: 13px 16px; text-align: left;
      cursor: pointer; font-size: 0.95rem; color: #374151;
      transition: border-color 0.2s, background 0.2s; line-height: 1.4;
    }
    .option-btn:hover:not(:disabled) { border-color: #6366f1; background: #eef2ff; }
    .option-btn.correct        { border-color: #10b981; background: #d1fae5; color: #065f46; }
    .option-btn.wrong          { border-color: #ef4444; background: #fee2e2; color: #991b1b; }
    .option-btn.reveal-correct { border-color: #10b981; background: #d1fae5; color: #065f46; }

    .feedback { margin-top: 16px; font-size: 0.92rem; font-weight: 500; min-height: 24px; }
    .feedback.correct-msg { color: #059669; }
    .feedback.wrong-msg   { color: #dc2626; }

    .next-btn {
      margin-top: 22px; background: #6366f1; color: #fff;
      border: none; border-radius: 10px; padding: 13px 28px;
      font-size: 0.97rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s; display: none;
    }
    .next-btn:hover { background: #4f46e5; }

    .result { text-align: center; }
    .score-ring {
      width: 110px; height: 110px; border-radius: 50%;
      margin: 0 auto 20px; display: flex; align-items: center;
      justify-content: center; font-size: 2.4rem; font-weight: 700; color: #fff;
    }
    .score-perfect { background: linear-gradient(135deg, #10b981, #059669); }
    .score-good    { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    .score-ok      { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .score-low     { background: linear-gradient(135deg, #ef4444, #dc2626); }

    .result h2 { font-size: 1.4rem; color: #1f2937; margin-bottom: 8px; }
    .result p  { color: #6b7280; margin-bottom: 24px; }
    .saving-msg { font-size: 0.85rem; color: #6b7280; margin-bottom: 12px; }

    .review { text-align: left; margin-top: 20px; }
    .review-item {
      border-radius: 10px; padding: 14px 16px;
      margin-bottom: 12px; font-size: 0.9rem; line-height: 1.5;
    }
    .review-item.correct-item { background: #d1fae5; border-left: 4px solid #10b981; }
    .review-item.wrong-item   { background: #fee2e2; border-left: 4px solid #ef4444; }
    .review-item .q-label     { font-weight: 600; color: #374151; margin-bottom: 4px; }
    .review-item .correct-a   { color: #065f46; font-weight: 600; }

    .retry-btn {
      background: #6366f1; color: #fff; border: none;
      border-radius: 10px; padding: 13px 32px;
      font-size: 0.97rem; font-weight: 600; cursor: pointer;
      margin-top: 8px; transition: background 0.2s;
    }
    .retry-btn:hover { background: #4f46e5; }
  </style>
</head>
<body>
<div class="card" id="app"></div>

<script>
const SCORE_WEBHOOK = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

const PE_QUESTIONS = [

  },

const TOTAL_QUESTIONS = 6;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestions() {
  const da = shuffle(DA_QUESTIONS).slice(0, 2);
  const dg = shuffle(DG_QUESTIONS).slice(0, 2);
  const pe = shuffle(PE_QUESTIONS).slice(0, 2);
  return shuffle([...da, ...dg, ...pe]);
}

let questions = [], current = 0, score = 0, answered = false, results = [], userName = "";

function init() {
  questions = []; current = 0; score = 0; answered = false; results = []; userName = "";
  renderNameScreen();
}

function renderNameScreen() {
  document.getElementById('app').innerHTML = `
    <h1>Hatch and Grow 2026</h1>
    <p class="subtitle">DTO Data Challenge Booth &nbsp;·&nbsp; 6 questions &nbsp;·&nbsp; 2 from each team &nbsp;·&nbsp; Score out of 6</p>
    <div class="name-screen">
      <label for="nameInput">Enter your name to begin</label>
      <input id="nameInput" type="text" placeholder="e.g. Jane Tan" autocomplete="off"
        oninput="document.getElementById('startBtn').disabled = this.value.trim().length < 2"
        onkeydown="if(event.key==='Enter' && this.value.trim().length >= 2) startQuiz()" />
      <button class="start-btn" id="startBtn" disabled onclick="startQuiz()">Start Quiz →</button>
    </div>
  `;
  document.getElementById('nameInput').focus();
}

function startQuiz() {
  userName = document.getElementById('nameInput').value.trim();
  if (!userName) return;
  questions = pickQuestions();
  current = 0; score = 0; answered = false; results = [];
  renderQuestion();
}

function renderQuestion() {
  const app = document.getElementById('app');
  const q   = questions[current];
  const labels = ['a', 'b', 'c', 'd'];

  app.innerHTML = `
    <h1>Hatch and Grow 2026</h1>
    <p class="subtitle">Hi <strong>${userName}</strong> &nbsp;·&nbsp; Score out of ${TOTAL_QUESTIONS}</p>
    <div class="progress">
      ${questions.map((_, i) => {
        let cls = 'progress-dot';
        if (i < current) cls += results[i] ? ' done' : ' wrong';
        else if (i === current) cls += ' active';
        return `<div class="${cls}"></div>`;
      }).join('')}
    </div>
    <span class="team-badge team-${q.team}">${q.team} Team</span>
    <div class="q-number">Question ${current + 1} of ${questions.length}</div>
    <div class="q-text">${q.text}</div>
    <div class="options" id="options">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectAnswer(${i})">
          <strong>${labels[i]})</strong>&nbsp; ${opt}
        </button>
      `).join('')}
    </div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">
      ${current < questions.length - 1 ? 'Next Question →' : 'See Results'}
    </button>
  `;
}

function selectAnswer(chosen) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const correct = q.answer;
  const btns = document.querySelectorAll('.option-btn');
  const fb   = document.getElementById('feedback');
  btns.forEach(b => b.disabled = true);
  if (chosen === correct) {
    btns[chosen].classList.add('correct');
    fb.textContent = '✓ Correct!';
    fb.className = 'feedback correct-msg';
    score++;
    results.push(true);
  } else {
    btns[chosen].classList.add('wrong');
    btns[correct].classList.add('reveal-correct');
    fb.textContent = `✗ Incorrect. Correct answer: ${['a','b','c','d'][correct]}) ${q.options[correct]}`;
    fb.className = 'feedback wrong-msg';
    results.push(false);
  }
  document.getElementById('next-btn').style.display = 'inline-block';
}

function nextQuestion() {
  answered = false;
  current++;
  if (current < questions.length) renderQuestion();
  else renderResult();
}

async function submitScore() {
  if (SCORE_WEBHOOK === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") return;
  const payload = {
    name:      userName,
    score:     score,
    total:     TOTAL_QUESTIONS,
    timestamp: new Date().toISOString(),
    questions: questions.map((q, i) => ({
      team:     q.team,
      question: q.text.split('\n')[0].slice(0, 80),
      correct:  results[i]
    }))
  };
  try {
    await fetch(SCORE_WEBHOOK, {
      method: "POST",
      mode:   "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    document.getElementById('saving-status').textContent = "✓ Score saved to log.";
  } catch {
    document.getElementById('saving-status').textContent = "";
  }
}

function renderResult() {
  const app = document.getElementById('app');
  const pct = score / TOTAL_QUESTIONS;
  let ringClass, msg;
  if (pct === 1)        { ringClass = 'score-perfect'; msg = 'Perfect score! Outstanding!'; }
  else if (pct >= 0.67) { ringClass = 'score-good';    msg = 'Great job! Almost there!'; }
  else if (pct >= 0.5)  { ringClass = 'score-ok';      msg = 'Good effort — keep practising!'; }
  else                  { ringClass = 'score-low';      msg = "Keep going — you'll get there!"; }

  const labels = ['a','b','c','d'];
  const reviewHTML = questions.map((q, i) => `
    <div class="review-item ${results[i] ? 'correct-item' : 'wrong-item'}">
      <div class="q-label">${results[i] ? '✓' : '✗'} Q${i+1}
        <span class="team-badge team-${q.team}" style="font-size:0.68rem;padding:2px 8px;">${q.team}</span>
        — ${q.text.split('\n')[0]}
      </div>
      <div class="correct-a">Correct answer: ${labels[q.answer]}) ${q.options[q.answer]}</div>
    </div>
  `).join('');

  app.innerHTML = `
    <div class="result">
      <div class="score-ring ${ringClass}">${score}/${TOTAL_QUESTIONS}</div>
      <h2>${msg}</h2>
      <p><strong>${userName}</strong>, you answered <strong>${score} out of ${TOTAL_QUESTIONS}</strong> correctly.</p>
      <div class="saving-msg" id="saving-status">Saving score…</div>
      <button class="retry-btn" onclick="init()">Try Again with New Questions</button>
      <div class="review">${reviewHTML}</div>
      <button class="retry-btn" style="margin-top:16px;" onclick="init()">Try Again with New Questions</button>
    </div>
  `;
  submitScore();
}

init();
</script>
